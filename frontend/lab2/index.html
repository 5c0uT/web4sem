<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Лабораторная работа №2</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top">
    <h1 class="title">Гусев Владислав Дмитриевич — Лабораторная работа №2</h1>
    <p class="subtitle">DOM, Events и Canvas: мини-Paint</p>
  </header>

  <main class="layout">
    <section class="panel" aria-label="Панель инструментов">
      <div class="panel__row">
        <div id="tools" class="tools" role="toolbar" aria-label="Инструменты"></div>
        <button id="clearBtn" class="btn btn--danger" type="button" title="Очистить холст">Очистить</button>
      </div>

      <div class="panel__row panel__row--wrap">
        <div class="label">Палитра (10 цветов):</div>
        <div id="palette" class="palette" aria-label="Палитра цветов"></div>
      </div>

      <div class="panel__row">
        <div id="status" class="status" aria-live="polite"></div>
      </div>

      <p id="domHint" class="hint">
        <strong>Подсказка:</strong> инструменты переключаются кнопками, рисование выполняется на canvas.
      </p>
    </section>

    <section class="canvasWrap" aria-label="Холст">
      <canvas id="canvas" class="canvas" aria-label="Canvas для рисования"></canvas>
      <p class="hint">
        Карандаш и ластик: зажмите и ведите. Линия: зажмите, тяните, отпустите.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
